server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
    }

    location /api/loki/ {
        proxy_pass http://loki:3100/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
